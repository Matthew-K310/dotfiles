set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind -n M-H previous-window
bind -n M-L next-window

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @rose_pine_window_left_separator " ŅéČ"
set -g @rose_pine_window_right_separator "Ņé┤┬Ā"
set -g @rose_pine_window_middle_separator " Ō¢ł"
set -g @rose_pine_window_number_position "right"

set -g @rose_pine_window_default_fill "number"
set -g @rose_pine_window_default_text "#W"

set -g @rose_pine_window_current_fill "number"
set -g @rose_pine_window_current_text "#W"
#
# set -g @rose_pine_status_modules_right "directory session"
set -g @rose_pine_status_left_separator  " ŅéČ"
set -g @rose_pine_status_right_separator "Ņé┤"
set -g @rose_pine_status_fill "icon"
set -g @rose_pine_status_connect_separator "no"

set -g @rose_pine_session_icon 'ŅŁ┐' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon 'Ņ¼Ż' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon '’Éō' # Changes the default icon to the left of the current directory folder
set -g @rose_pine_username_icon '’Ćć' # Changes the default icon to the right of the hostname
set -g @rose_pine_hostname_icon '¾░Æŗ' # Changes the default icon to the right of the hostname
set -g @rose_pine_date_time_icon '¾░ā░' # Changes the default icon to the right of the date module
set -g @rose_pine_window_status_separator " ŅŁ░ " 

# Window
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_default_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

# set -g @rose_pine_directory_text $cwd

set-option -g status-position bottom

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @rose_pine_variant 'main'
set -g status-style "bg=#908caa"
# set -g status-left ' '
set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[0]' ''
set -g status 2

set-window-option -g mode-keys vi 

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind r source-file ~/.config/tmux/tmux.conf

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

run '~/.tmux/plugins/tpm/tpm'
